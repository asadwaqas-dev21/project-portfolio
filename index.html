<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        rel="stylesheet">
    <style>
        :root {
            --orange: #FF631F;
            --golden: #FBB439;
            --charcoal: #232529;
            --ink: #2b2d31;
            --paper: #FAF9F7;
            --card: #FFFFFF;
            --line: #e8e5df;
            --muted: #8a8781;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: 'Roboto', system-ui, sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        .sg {
            font-family: 'Montserrat', sans-serif
        }

        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ============ PREMIUM HEADER ============ */
        .topbar {
            position: relative;
            background: rgba(15, 15, 18, 1);
            color: #ffffff;
            padding: 16px 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .topbar::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--orange), var(--golden), var(--orange));
            background-size: 200% 100%;
            animation: gradientFlow 4s linear infinite;
        }

        .topbar-inner {
            max-width: 1180px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .brand-mark {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            flex: none;
            background: linear-gradient(135deg, var(--orange), var(--golden), #ff512f);
            background-size: 200% 200%;
            animation: gradientFlow 3s ease infinite;
            display: grid;
            place-items: center;
            font-family: 'Montserrat';
            font-weight: 700;
            font-size: 19px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 99, 31, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .brand-name {
            font-family: 'Montserrat';
            font-weight: 700;
            font-size: 17.5px;
            letter-spacing: -0.3px;
        }

        .brand-sub {
            font-size: 11.5px;
            color: #a1a1aa;
            font-weight: 500;
            margin-top: 2px;
            letter-spacing: 0.2px;
        }

        .topbar .total {
            margin-left: auto;
            font-family: 'Montserrat';
            font-size: 13px;
            color: #e4e4e7;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            backdrop-filter: blur(10px);
        }

        .topbar .total b {
            color: var(--golden);
            font-weight: 700;
        }

        /* ============ CONTROL BAR ============ */
        .controls {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(250, 249, 247, .94);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
        }

        .controls-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search {
            flex: 1 1 200px;
            min-width: 180px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 15px;
        }

        .search svg {
            flex: none;
            opacity: .45
        }

        .search input {
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            font: inherit;
            font-size: 14px;
            color: var(--ink);
        }

        .chips {
            display: flex;
            gap: 7px;
            flex-wrap: wrap
        }

        .chip {
            font-family: 'Montserrat';
            font-size: 12.5px;
            font-weight: 500;
            padding: 7px 13px;
            border-radius: 999px;
            cursor: pointer;
            border: 1px solid var(--line);
            background: var(--card);
            color: var(--ink);
            transition: all .15s ease;
            white-space: nowrap;
        }

        .chip .n {
            display: inline-block;
            margin-left: 5px;
            font-size: 11px;
            background: var(--paper);
            border-radius: 999px;
            padding: 1px 6px;
            color: var(--muted);
        }

        .chip:hover {
            border-color: var(--orange);
            color: var(--orange)
        }

        .chip.active {
            background: var(--charcoal);
            color: #fff;
            border-color: var(--charcoal)
        }

        .chip.active .n {
            background: rgba(255, 255, 255, .14);
            color: var(--golden)
        }

        /* ============ SECTIONS ============ */
        main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 36px 24px 80px
        }

        section {
            margin-bottom: 54px;
            scroll-margin-top: 76px
        }

        section.hidden {
            display: none
        }

        .sec-head {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap
        }

        .sec-head h2 {
            font-size: 21px;
            font-weight: 600;
            letter-spacing: -.3px
        }

        .sec-head .count {
            font-family: 'Montserrat';
            font-size: 12.5px;
            color: var(--orange);
            border: 1px solid #ffd9c4;
            background: #fff4ec;
            border-radius: 999px;
            padding: 1px 10px;
        }

        .sub-label {
            font-family: 'Montserrat';
            font-size: 11.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin: 22px 0 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sub-label::after {
            content: "";
            height: 1px;
            flex: 1;
            background: var(--line)
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
            gap: 16px;
        }

        /* ============ IMAGE CARDS ============ */
        .card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
        }

        .card.hidden {
            display: none
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #f4c9ad;
            box-shadow: 0 14px 30px -16px rgba(35, 37, 41, .28);
        }

        .card:focus-visible {
            outline: 2px solid var(--orange);
            outline-offset: 2px
        }

        .thumb {
            aspect-ratio: 16/10;
            background: #eeece7;
            overflow: hidden;
            position: relative;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
            transition: transform .35s ease;
        }

        .card:hover .thumb img {
            transform: scale(1.04)
        }

        /* placeholder tiles for Drive etc. */
        .thumb.tile {
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #2b2d31 0%, #232529 55%, #3a2c22 100%);
            color: var(--golden);
        }

        .thumb.tile svg {
            width: 34px;
            height: 34px;
            opacity: .95
        }

        .thumb.tile .tile-type {
            position: absolute;
            bottom: 9px;
            left: 11px;
            font-family: 'Montserrat';
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: #8f9093;
        }

        .open-hint {
            position: absolute;
            top: 9px;
            right: 9px;
            width: 27px;
            height: 27px;
            border-radius: 8px;
            background: rgba(35, 37, 41, .65);
            backdrop-filter: blur(4px);
            display: grid;
            place-items: center;
            color: #fff;
            opacity: 0;
            transform: translateY(-3px);
            transition: all .18s ease;
        }

        .card:hover .open-hint {
            opacity: 1;
            transform: translateY(0)
        }

        .open-hint svg {
            width: 13px;
            height: 13px
        }

        .badge {
            position: absolute;
            top: 9px;
            left: 9px;
            font-size: 9.5px;
            font-weight: 600;
            letter-spacing: .7px;
            text-transform: uppercase;
            color: #232529;
            background: var(--golden);
            border-radius: 5px;
            padding: 2.5px 7px;
            font-family: 'Montserrat';
        }

        .card-meta {
            padding: 11px 13px 12px
        }

        .card-title {
            font-family: 'Montserrat';
            font-weight: 600;
            font-size: 13.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-url {
            font-size: 11.5px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }

        footer {
            border-top: 1px solid var(--line);
            padding: 28px 24px 38px;
            text-align: center;
            color: var(--muted);
            font-size: 12.5px;
        }

        footer b {
            font-family: 'Montserrat';
            color: var(--ink)
        }

        .empty {
            display: none;
            text-align: center;
            padding: 70px 20px;
            color: var(--muted)
        }

        .empty.show {
            display: block
        }

        .empty .sg {
            font-size: 19px;
            color: var(--ink);
            margin-bottom: 5px
        }

        @media (max-width:640px) {
            main {
                padding: 28px 14px 60px
            }

            .controls-inner {
                padding: 10px 14px
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 11px
            }

            .card-meta {
                padding: 9px 11px 10px
            }
        }

        @media (prefers-reduced-motion:reduce) {
            * {
                transition: none !important;
                animation: none !important
            }

            html {
                scroll-behavior: auto
            }
        }
    </style>
</head>

        /* ============================================================ RENDER */
        const main = document.getElementById('main');
        const chipsEl = document.getElementById('chips');
        const emptyState = document.getElementById('emptyState');

        function hostOf(u) { try { return new URL(u).hostname.replace('www.', ''); } catch (e) { return u; } }

        /* Live screenshot via WordPress mShots (free, no API key).
           First request generates the shot, so a few thumbs may take a
           refresh or two to appear the very first time the page is opened. */
        function shotUrl(u) {
            return 'https://s.wordpress.com/mshots/v1/' + encodeURIComponent(u) + '?w=640&h=400';
        }

        function tileHtml(kind, url) {
            const t = TILE_ICONS[kind] || TILE_ICONS.drive;
            return `<div class="thumb tile">${t.svg}<span class="tile-type">${t.label}</span></div>`;
        }

        function thumbHtml(it) {
            if (it.img) {
                return `<div class="thumb"><img loading="lazy" src="${it.img}" alt="${it.t} screenshot" style="object-position: center;"></div>`;
            }
            if (it.tile) return tileHtml(it.tile, it.u);
            if (it.u.includes('figma.com')) {
                /* Figma files need login for mShots — branded tile instead */
                return `<div class="thumb tile">${TILE_ICONS.figma.svg}<span class="tile-type">Figma Design</span></div>`;
            }
            return `<div class="thumb"><img loading="lazy" src="${shotUrl(it.u)}" alt="${it.t} screenshot"
    onerror="this.parentElement.outerHTML='<div class=&quot;thumb tile&quot;>${'<'}svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;1.7&quot;><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;9&quot;/><path d=&quot;M3 12h18M12 3c3 3.5 3 14 0 18M12 3c-3 3.5-3 14 0 18&quot;/></svg><span class=&quot;tile-type&quot;>Website</span></div>'"></div>`;
        }

        let totalLinks = 0;
        DATA.forEach(cat => {
            const sec = document.createElement('section');
            sec.id = 'sec-' + cat.id;
            sec.dataset.cat = cat.id;
            let count = 0, inner = '';
            cat.groups.forEach(g => {
                if (g.sub) inner += `<div class="sub-label">${g.sub}</div>`;
                inner += `<div class="grid">`;
                g.items.forEach(it => {
                    count++; totalLinks++;
                    const badge = it.badge ? `<span class="badge">${it.badge}</span>` : '';
                    inner += `
      <a class="card" href="${it.u}" target="_blank" rel="noopener"
         data-search="${(it.t + ' ' + it.u + ' ' + cat.label).toLowerCase()}">
        ${thumbHtml(it)}
        ${badge}
        <span class="open-hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M7 17 17 7M9 7h8v8"/></svg></span>
        <div class="card-meta">
          <div class="card-title">${it.t}</div>
          <div class="card-url">${hostOf(it.u)}</div>
        </div>
      </a>`;
                });
                inner += `</div>`;
            });
            sec.innerHTML = `
    <div class="sec-head"><h2>${cat.h}</h2><span class="count">${count}</span></div>
    ${inner}`;
            main.appendChild(sec);
            cat._count = count;
        });

        document.getElementById('totalCount').innerHTML = `<b>${totalLinks}</b> projects · ${DATA.length} categories`;

        /* chips */
        let active = 'all';
        function renderChips() {
            chipsEl.innerHTML =
                `<button class="chip ${active === 'all' ? 'active' : ''}" data-cat="all">All <span class="n">${totalLinks}</span></button>` +
                DATA.map(c => `<button class="chip ${active === c.id ? 'active' : ''}" data-cat="${c.id}">${c.label} <span class="n">${c._count}</span></button>`).join('');
        }
        renderChips();

        chipsEl.addEventListener('click', e => {
            const b = e.target.closest('.chip'); if (!b) return;
            active = b.dataset.cat;
            renderChips();
            applyFilter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        /* search + filter */
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', applyFilter);

        function applyFilter() {
            const q = searchInput.value.trim().toLowerCase();
            let visibleTotal = 0;
            document.querySelectorAll('section[data-cat]').forEach(sec => {
                const catMatch = active === 'all' || sec.dataset.cat === active;
                let visInSec = 0;
                sec.querySelectorAll('.card').forEach(card => {
                    const match = catMatch && (!q || card.dataset.search.includes(q));
                    card.classList.toggle('hidden', !match);
                    if (match) visInSec++;
                });
                sec.querySelectorAll('.grid').forEach(grid => {
                    const any = grid.querySelector('.card:not(.hidden)');
                    grid.style.display = any ? '' : 'none';
                    const lbl = grid.previousElementSibling;
                    if (lbl && lbl.classList.contains('sub-label')) lbl.style.display = any ? '' : 'none';
                });
                sec.classList.toggle('hidden', visInSec === 0);
                visibleTotal += visInSec;
            });
            emptyState.classList.toggle('show', visibleTotal === 0);
        }
    </script>
